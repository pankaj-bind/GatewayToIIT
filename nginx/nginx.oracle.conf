# =============================================================================
# GatewayToIIT - Oracle Cloud Nginx Config (API-only)
# =============================================================================
# Loaded via nginx's envsubst template mechanism -- ${DOMAIN} is substituted
# by `docker-compose.oracle.yml`'s command at startup.
#
# Responsibilities:
#   - HTTP -> HTTPS redirect
#   - Let's Encrypt ACME webroot challenge
#   - Terminate TLS for https://${DOMAIN}
#   - Reverse-proxy /api/, /admin/, /static/, /media/ to Django
#   - Permit large video uploads + long timeouts for FFmpeg-backed endpoints
#
# It does NOT serve a React SPA -- the frontend is hosted on Vercel.
# =============================================================================

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

upstream backend {
    server backend:8000;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# HTTP :80 - ACME challenge + permanent redirect to HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS :443 - API, admin, static, media, video streaming
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    # Unlimited uploads (video). Disk is the real limit; add a cap here if
    # the Oracle VM's disk fills up faster than you'd like.
    client_max_body_size 0;
    client_body_timeout 600s;

    # FFmpeg processing + Google Drive uploads can take minutes.
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers (no CSP here -- the Vercel-hosted frontend owns its
    # own CSP; this server serves JSON + admin + media).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css text/plain text/xml image/svg+xml font/woff font/woff2;

    # Strict rate limit on auth/token endpoints
    location ~ ^/api/auth/(login|register|token) {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
    }

    # General API + video uploads
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # Required for chunked video streaming responses.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Django static (admin + DRF browsable API assets)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # User media (videos, thumbnails). Long cache since filenames include
    # hashes/IDs; if you serve short-lived tokenised URLs, shorten this.
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Uptime-monitor health check
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Root: no SPA here; return JSON pointing clients at the frontend.
    location = / {
        add_header Content-Type application/json;
        return 200 '{"service":"gatewaytoiit-api","status":"ok","docs":"/api/"}';
    }

    # Block dotfiles and leaky paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ /(\.env|\.git|docker-compose) {
        deny all;
        return 404;
    }
}
