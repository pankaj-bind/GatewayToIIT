# =============================================================================
# GatewayToIIT - Oracle Cloud Production Compose (API-only)
# =============================================================================
# Hosts:
#   - Frontend:  Vercel (e.g. gatewaytoiit.vercel.app) - NOT deployed here
#   - Backend :  Oracle Cloud Ampere A1 VM (this file)
#
# Services on VM:
#   backend       -> Django + Gunicorn + FFmpeg (internal network)
#   nginx         -> TLS termination + reverse proxy (80/443 public)
#   certbot       -> Let's Encrypt auto-renewal
#   sqlite-backup -> Hourly hot backups of db.sqlite3 (7-day retention)
#
# NOTE: No `db` service. The app uses SQLite; the `db.sqlite3` file lives in
# the `sqlite_data` named volume, which is what gets backed up. If you ever
# migrate to Postgres, add a `db` service and set DATABASE_URL.
# =============================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gatewaytoiit-backend
    restart: always
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      # DOMAIN is the API hostname (e.g. gatewaytoiit.duckdns.org). We also
      # allow the raw IP so container healthchecks still work.
      ALLOWED_HOSTS: ${DOMAIN},${PUBLIC_IP},backend,localhost,127.0.0.1
      # Pinned Vercel origin + any extras. Preview deploys are matched via
      # CORS_ALLOWED_ORIGIN_REGEXES in settings.py.
      CORS_ALLOWED_ORIGINS: ${FRONTEND_ORIGIN:-https://gatewaytoiit.vercel.app}
      CSRF_TRUSTED_ORIGINS: https://${DOMAIN},${FRONTEND_ORIGIN:-https://gatewaytoiit.vercel.app}
      # Cross-origin cookies over HTTPS
      AUTH_COOKIE_SECURE: "True"
      AUTH_COOKIE_SAMESITE: "None"
      SESSION_COOKIE_SECURE: "True"
      SESSION_COOKIE_SAMESITE: "None"
      CSRF_COOKIE_SECURE: "True"
      CSRF_COOKIE_SAMESITE: "None"
      SECURE_SSL_REDIRECT: "True"

      # Single-user lockdown
      SIGNUP_ENABLED: ${SIGNUP_ENABLED:-False}
      ALLOWED_LOGIN_EMAILS: ${ALLOWED_LOGIN_EMAILS:-}

      # Integrations
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}

      # SQLite file path -- must be on the mounted volume, otherwise every
      # container recreate wipes the database.
      SQLITE_PATH: /app/db-data/db.sqlite3

      # Gunicorn sizing. Override in .env if needed.
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-300}
    volumes:
      # SQLite lives in a named volume so it survives container recreates.
      # The file itself is at /app/db.sqlite3; docker-entrypoint.sh migrates
      # against it on every boot.
      - sqlite_data:/app/db-data
      - static_files:/app/staticfiles
      - media_files:/app/media
      # Google OAuth credentials mounted read-only. These are uploaded to
      # the VM once via scp, never committed to git.
      - ./backend/credentials.json:/app/credentials.json:ro
      - ./backend/token.json:/app/token.json:ro
    networks:
      # `external` so the backend can reach Google Drive, Telegram, Let's
      # Encrypt HIBP, etc. We never publish the port, so no inbound risk.
      - external
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G
        reservations:
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    container_name: gatewaytoiit-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.oracle.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    networks:
      - external
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    # Render the envsubst template ourselves (the stock entrypoint only runs
    # init scripts when $1 is "nginx"), then keep nginx up with a 6h reload
    # loop so Let's Encrypt renewals are picked up without a restart.
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
        { while :; do sleep 6h & wait $${!}; nginx -s reload 2>/dev/null || true; done; } &
        exec nginx -g 'daemon off;'

  certbot:
    image: certbot/certbot:latest
    container_name: gatewaytoiit-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - external
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # SQLite hot-backup sidecar
  # ---------------------------------------------------------------------------
  # Every hour, takes a snapshot of db.sqlite3 using `sqlite3 .backup`, gzips
  # it, and rotates out anything older than 7 days. The snapshot is taken
  # inside the same volume as the live DB, then gzipped into ./backups on the
  # host for easy rsync/rclone to off-site storage.
  # ---------------------------------------------------------------------------
  sqlite-backup:
    image: alpine:3.20
    container_name: gatewaytoiit-sqlite-backup
    restart: always
    depends_on:
      - backend
    volumes:
      - sqlite_data:/app/db-data:ro
      - ./backups:/backups
      - ./scripts/sqlite-backup.sh:/usr/local/bin/sqlite-backup.sh:ro
    command: ["/bin/sh", "-c", "apk add --no-cache sqlite gzip coreutils >/dev/null && /usr/local/bin/sqlite-backup.sh"]
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

networks:
  external:
    driver: bridge

volumes:
  sqlite_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
